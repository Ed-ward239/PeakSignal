# XcodeGen spec — generate PeakSignal.xcodeproj on a Mac with:
#   brew install xcodegen && xcodegen generate
#
# This file is the source of truth for the Xcode project so the whole
# project (targets, build settings, capabilities) is reproducible from text
# and survives in version control without committing the .xcodeproj.

name: PeakSignal
options:
  bundleIdPrefix: com.peaksignal
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "" # set your Apple Developer Team ID
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: true
    ENABLE_USER_SCRIPT_SANDBOXING: true

configFiles:
  Debug: Config/Secrets.xcconfig
  Release: Config/Secrets.xcconfig

targets:
  PeakSignal:
    type: application
    platform: iOS
    sources:
      - App
      - Phase1_Intelligence
      - Phase2_Planning
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peaksignal.app
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Used to map your itinerary stops and optimise daily routes."
        INFOPLIST_KEY_NSCalendarsUsageDescription: "Used to export your trip itinerary to Apple Calendar."
    entitlements:
      path: App/PeakSignal.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.peaksignal.app
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.usernotifications.time-sensitive: true
        aps-environment: development
    dependencies:
      - target: PeakSignalWidgets
      - target: PeakSignalAppClip
    info:
      path: App/Info.plist
      properties:
        BGTaskSchedulerPermittedIdentifiers:
          - com.peaksignal.app.pricesync
        UIBackgroundModes:
          - fetch
          - processing
          - remote-notification

  PeakSignalWidgets:
    type: app-extension
    platform: iOS
    sources:
      - Widgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peaksignal.app.widgets
        INFOPLIST_KEY_CFBundleDisplayName: "Peak Signal Widgets"
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension

  PeakSignalAppClip:
    type: application.on-demand-install-capable
    platform: iOS
    sources:
      - AppClip
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peaksignal.app.Clip
    entitlements:
      path: AppClip/AppClip.entitlements
      properties:
        com.apple.developer.parent-application-identifiers:
          - $(AppIdentifierPrefix)com.peaksignal.app
